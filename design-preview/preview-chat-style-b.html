<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B · 글래스모피즘</title>
<style>
  :root{--ink:#1f2d3d; --muted:#5b6b80;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    background:
      radial-gradient(900px 500px at 15% 10%, #6a8cff55, transparent),
      radial-gradient(800px 600px at 90% 90%, #56ccf255, transparent),
      linear-gradient(135deg,#0f172a,#1b2a4a);}
  .panel{width:420px;border-radius:22px;overflow:hidden;
    background:rgba(255,255,255,.14);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border:1px solid rgba(255,255,255,.28);
    box-shadow:0 24px 60px rgba(0,0,0,.35);}
  .ph{display:flex;align-items:center;gap:10px;padding:16px 18px;
    background:rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.18);color:#fff;}
  .ph .dot{width:10px;height:10px;border-radius:50%;background:#7fffce;box-shadow:0 0 0 4px rgba(127,255,206,.25);}
  .ph .t{font-weight:700;font-size:1rem;text-shadow:0 1px 6px rgba(0,0,0,.25);}
  .ph .b{margin-left:auto;font-size:.7rem;background:rgba(255,255,255,.2);
    padding:3px 10px;border-radius:20px;}
  .thread{padding:18px;display:flex;flex-direction:column;gap:14px;min-height:230px;}
  .msg{display:flex;gap:10px;align-items:flex-end;}
  .av{width:34px;height:34px;border-radius:11px;flex:0 0 auto;
    background:linear-gradient(135deg,#7aa2ff,#56ccf2);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:.85rem;
    box-shadow:0 4px 12px rgba(0,0,0,.25);}
  .bub{background:rgba(255,255,255,.92);border-radius:14px;border-top-left-radius:4px;
    padding:11px 14px;color:var(--ink);font-size:.9rem;line-height:1.5;
    box-shadow:0 6px 16px rgba(0,0,0,.18);}
  .chips{display:flex;gap:8px;padding:0 18px 6px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;
    font-size:.8rem;color:#0f2440;background:rgba(255,255,255,.55);
    border:1px solid rgba(255,255,255,.6);border-radius:20px;cursor:pointer;
    backdrop-filter:blur(6px);}
  .chip:hover{background:rgba(255,255,255,.8);}
  .composer{padding:14px 18px 18px;}
  .row{display:flex;gap:8px;}
  .inp{flex:1;border:1px solid rgba(255,255,255,.4);border-radius:14px;padding:11px 14px;
    font:inherit;font-size:.9rem;color:#fff;background:rgba(255,255,255,.12);outline:none;}
  .inp::placeholder{color:rgba(255,255,255,.7);}
  .inp:focus{border-color:#9fd0ff;box-shadow:0 0 0 3px rgba(120,180,255,.25);}
  .send{border:0;border-radius:14px;padding:0 18px;font-weight:700;color:#0f2440;
    background:linear-gradient(135deg,#ffffff,#cfe6ff);cursor:pointer;}
  .send:hover{filter:brightness(1.04);}
  .hint{margin:8px 2px 0;font-size:.72rem;color:rgba(255,255,255,.8);}
</style>
</head>
<body>
  <div class="panel">
    <div class="ph"><span class="dot"></span><span class="t">북구청 AI 민원 안내</span><span class="b">안내</span></div>
    <div class="thread">
      <div class="msg"><div class="av">A</div><div class="bub">안녕하세요. 북구청 민원 안내 AI입니다. 궁금한 민원을 물어보시면 관련 화면을 함께 열어 경로를 안내해 드립니다.</div></div>
    </div>
    <div class="chips">
      <div class="chip">🚗 불법 주정차 신고</div>
      <div class="chip">🏢 공동주택 부서 문의</div>
    </div>
    <div class="composer">
      <div class="row">
        <input class="inp" placeholder="민원에 대해 물어보세요...">
        <button class="send">보내기</button>
      </div>
      <p class="hint">첫 질문 후 북구청 안내 화면과 함께 경로를 보여드립니다.</p>
    </div>
  </div>
</body>
</html>
