<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D · ChatGPT톤 (북구청 민원 안내)</title>
<style>
  :root{
    --ink:#0d0d0f; --muted:#8e8ea0; --line:#e6e6ea;
    --bub:#f4f4f6; --pill:#fff; --pill-bd:#e3e3e8;
    --voice:#ef6a4c; --accent:#0d0d0f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:#fff;
    font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Segoe UI",sans-serif;
    color:var(--ink);display:flex;flex-direction:column;}
  /* 상단 얇은 바 (사이트 명만) */
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 20px;
    border-bottom:1px solid #f0f0f3;}
  .topbar .logo{width:26px;height:26px;border-radius:7px;
    background:linear-gradient(135deg,#2f80ed,#56ccf2);color:#fff;
    display:grid;place-items:center;font-weight:800;font-size:.8rem;}
  .topbar .name{font-weight:700;font-size:.95rem;letter-spacing:-.01em;}
  .topbar .tag{margin-left:auto;font-size:.72rem;color:var(--muted);}

  /* 중앙 영역 */
  .center{flex:1;display:grid;place-items:center;padding:24px;}
  .stage{width:100%;max-width:680px;}
  .greet{text-align:center;font-size:1.7rem;font-weight:700;
    letter-spacing:-.02em;margin-bottom:26px;
    background:linear-gradient(90deg,#1c3d6e,#2f80ed,#56ccf2);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .box{border:1px solid var(--line);border-radius:26px;padding:14px 16px;
    background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.05);}
  .box .row{display:flex;align-items:center;gap:10px;}
  .box .add{width:34px;height:34px;border-radius:50%;border:1px solid var(--pill-bd);
    display:grid;place-items:center;cursor:pointer;font-size:1.1rem;color:var(--ink);flex:0 0 auto;}
  .box .inp{flex:1;border:0;outline:none;font:inherit;font-size:1rem;
    color:var(--ink);background:transparent;padding:8px 4px;}
  .box .inp::placeholder{color:var(--muted);}
  .box .tools{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .box .chip-tool{border:1px solid var(--pill-bd);border-radius:14px;padding:6px 10px;
    font-size:.78rem;color:var(--muted);cursor:pointer;background:var(--pill);}
  .box .voice{width:34px;height:34px;border-radius:50%;border:0;cursor:pointer;
    background:var(--voice);color:#fff;display:grid;place-items:center;}

  /* 하단 액션 칩 */
  .actions{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap;}
  .act{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--pill-bd);
    border-radius:20px;padding:9px 15px;font-size:.85rem;color:var(--ink);
    background:var(--pill);cursor:pointer;}
  .act:hover{background:#fafafb;}
  .act .em{font-size:.95rem;}

  /* 대화가 시작된 상태 미리보기 (옵션) */
  .thread{display:none;flex-direction:column;gap:14px;margin-bottom:18px;}
  .msg{display:flex;gap:10px;align-items:flex-end;}
  .av{width:30px;height:30px;border-radius:50%;flex:0 0 auto;
    background:linear-gradient(135deg,#2f80ed,#56ccf2);color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:.75rem;}
  .bub{background:var(--bub);border-radius:18px;border-top-left-radius:6px;
    padding:12px 15px;font-size:.95rem;line-height:1.55;}
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">B</div>
    <div class="name">북구청 AI 민원 안내</div>
    <div class="tag">정적 시연 · 안내</div>
  </div>

  <div class="center">
    <div class="stage">
      <div class="greet">무엇이든 편하게 시작해 보세요.</div>

      <!-- 대화 시작 전: 중앙 입력 + 하단 액션 -->
      <div class="box">
        <div class="row">
          <div class="add">+</div>
          <input class="inp" placeholder="민원에 대해 물어보세요">
          <div class="tools">
            <span class="chip-tool">높음</span>
            <span class="chip-tool">🎤</span>
            <button class="voice">●</button>
          </div>
        </div>
      </div>
      <div class="actions">
        <div class="act"><span class="em">🚗</span>불법 주정차 신고</div>
        <div class="act"><span class="em">🏢</span>공동주택 부서 문의</div>
        <div class="act"><span class="em">🗑️</span>대형폐기물 배출</div>
      </div>
    </div>
  </div>
</body>
</html>
