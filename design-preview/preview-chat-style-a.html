<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A · 정부/공공 세련형</title>
<style>
  :root{
    --ink:#1f2d3d; --muted:#607086; --line:#d7e1ec;
    --deep:#1c3d6e; --sky:#2f80ed; --sky-2:#56ccf2; --pill:#eef4fb;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    background:linear-gradient(135deg,#eef3f8 0%,#dfe9f5 100%);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  .panel{width:420px;background:#fff;border:1px solid var(--line);
    border-radius:18px;box-shadow:0 18px 50px rgba(28,61,110,.16);overflow:hidden;}
  .ph{display:flex;align-items:center;gap:10px;padding:16px 18px;
    background:linear-gradient(135deg,var(--deep),var(--sky));
    color:#fff;}
  .ph .dot{width:10px;height:10px;border-radius:50%;background:#7fffce;box-shadow:0 0 0 4px rgba(127,255,206,.25);}
  .ph .t{font-weight:700;font-size:1rem;}
  .ph .b{margin-left:auto;font-size:.7rem;background:rgba(255,255,255,.16);
    padding:3px 10px;border-radius:20px;}
  .thread{padding:18px;display:flex;flex-direction:column;gap:14px;
    background:#fbfdff;min-height:230px;}
  .msg{display:flex;gap:10px;align-items:flex-end;}
  .av{width:34px;height:34px;border-radius:10px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--deep),var(--sky));color:#fff;
    display:grid;place-items:center;font-weight:700;font-size:.85rem;}
  .bub{background:#fff;border:1px solid var(--line);border-radius:14px;
    border-top-left-radius:4px;padding:11px 14px;color:var(--ink);
    font-size:.9rem;line-height:1.5;box-shadow:0 2px 8px rgba(28,61,110,.06);}
  .chips{display:flex;gap:8px;padding:0 18px 6px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;
    font-size:.8rem;color:var(--deep);background:var(--pill);
    border:1px solid var(--line);border-radius:20px;cursor:pointer;}
  .chip:hover{background:#e2edfb;border-color:#b0c4da;}
  .composer{padding:14px 18px 18px;}
  .row{display:flex;gap:8px;}
  .inp{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 14px;
    font:inherit;font-size:.9rem;color:var(--ink);outline:none;}
  .inp:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(47,128,237,.15);}
  .send{border:0;border-radius:12px;padding:0 18px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,var(--sky),var(--sky-2));cursor:pointer;}
  .send:hover{filter:brightness(1.05);}
  .hint{margin:8px 2px 0;font-size:.72rem;color:var(--muted);}
</style>
</head>
<body>
  <div class="panel">
    <div class="ph"><span class="dot"></span><span class="t">북구청 AI 민원 안내</span><span class="b">안내</span></div>
    <div class="thread">
      <div class="msg"><div class="av">A</div><div class="bub">안녕하세요. 북구청 민원 안내 AI입니다. 궁금한 민원을 물어보시면 관련 화면을 함께 열어 경로를 안내해 드립니다.</div></div>
    </div>
    <div class="chips">
      <div class="chip">🚗 불법 주정차 신고</div>
      <div class="chip">🏢 공동주택 부서 문의</div>
    </div>
    <div class="composer">
      <div class="row">
        <input class="inp" placeholder="민원에 대해 물어보세요...">
        <button class="send">보내기</button>
      </div>
      <p class="hint">첫 질문 후 북구청 안내 화면과 함께 경로를 보여드립니다.</p>
    </div>
  </div>
</body>
</html>
