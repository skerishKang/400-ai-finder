<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C · 미니멀 라이트 (카카오/토스톤)</title>
<style>
  :root{--ink:#1a1a1f; --muted:#8a8a90; --line:#ececef;
    --point:#3b6ef0; --soft:#f3f5f9;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:grid;place-items:center;
    background:#f6f7f9;
    font-family:system-ui,-apple-system,"Apple SD Gothic Neo","Segoe UI",sans-serif;}
  .panel{width:420px;background:#fff;border-radius:20px;overflow:hidden;
    border:1px solid #f0f0f3;box-shadow:0 8px 30px rgba(20,20,30,.07);}
  .ph{display:flex;align-items:center;gap:10px;padding:18px 20px;
    border-bottom:1px solid var(--line);}
  .ph .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;}
  .ph .t{font-weight:700;font-size:1.02rem;color:var(--ink);letter-spacing:-.01em;}
  .ph .b{margin-left:auto;font-size:.7rem;color:var(--point);
    background:#eef2fe;padding:3px 10px;border-radius:20px;font-weight:600;}
  .thread{padding:20px;display:flex;flex-direction:column;gap:14px;min-height:230px;}
  .msg{display:flex;gap:10px;align-items:flex-end;}
  .av{width:30px;height:30px;border-radius:50%;flex:0 0 auto;
    background:var(--point);color:#fff;display:grid;place-items:center;
    font-weight:700;font-size:.78rem;}
  .bub{background:var(--soft);border-radius:18px;border-top-left-radius:6px;
    padding:12px 15px;color:var(--ink);font-size:.92rem;line-height:1.55;}
  .chips{display:flex;gap:8px;padding:0 20px 6px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
    font-size:.82rem;color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:22px;cursor:pointer;
    font-weight:500;}
  .chip:hover{background:var(--soft);border-color:#d9dde6;}
  .composer{padding:16px 20px 20px;}
  .row{display:flex;gap:8px;}
  .inp{flex:1;border:1px solid var(--line);border-radius:14px;padding:12px 15px;
    font:inherit;font-size:.92rem;color:var(--ink);outline:none;background:#fcfcfd;}
  .inp::placeholder{color:var(--muted);}
  .inp:focus{border-color:var(--point);box-shadow:0 0 0 3px rgba(59,110,240,.12);}
  .send{border:0;border-radius:14px;padding:0 20px;font-weight:700;color:#fff;
    background:var(--point);cursor:pointer;font-size:.92rem;}
  .send:hover{background:#335fcf;}
  .hint{margin:9px 2px 0;font-size:.74rem;color:var(--muted);}
</style>
</head>
<body>
  <div class="panel">
    <div class="ph"><span class="dot"></span><span class="t">북구청 AI 민원 안내</span><span class="b">안내</span></div>
    <div class="thread">
      <div class="msg"><div class="av">A</div><div class="bub">안녕하세요. 북구청 민원 안내 AI입니다. 궁금한 민원을 물어보시면 관련 화면을 함께 열어 경로를 안내해 드립니다.</div></div>
    </div>
    <div class="chips">
      <div class="chip">🚗 불법 주정차 신고</div>
      <div class="chip">🏢 공동주택 부서 문의</div>
    </div>
    <div class="composer">
      <div class="row">
        <input class="inp" placeholder="민원에 대해 물어보세요...">
        <button class="send">보내기</button>
      </div>
      <p class="hint">첫 질문 후 북구청 안내 화면과 함께 경로를 보여드립니다.</p>
    </div>
  </div>
</body>
</html>
