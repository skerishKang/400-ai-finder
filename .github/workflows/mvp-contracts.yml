name: MVP Contract Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mvp-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run MVP contract pytest suite
        run: |
          python -m pytest -q \
            tests/test_mvp_failure_codes.py \
            tests/test_mobile_demo.py \
            tests/test_citizen_first_use_shell.py \
            tests/test_citizen_action_demo_chat_shell_contract.py \
            tests/test_citizen_action_demo_canvas.py

      - name: Run canonical official snapshot contracts
        run: |
          python -m pytest -q \
            tests/test_bukgu_official_apartment_snapshot.py \
            tests/test_renderer_route_manifest_fidelity.py \
            tests/test_capture_required_entry_spec.py \
            tests/test_exact_official_site_clone_invariant.py \
            tests/test_bukgu_quest_schema.py \
            tests/test_bukgu_quest_to_action_plan.py \
            tests/test_mvp_golden_quest_fidelity_matrix.py

      - name: Run legacy requests transport contract tests
        run: python -m pytest -q tests/test_legacy_requests_transport.py

      - name: Run legacy crawler fallback contract suites
        run: |
          python -m pytest -q \
            tests/test_url_crawler.py \
            tests/test_homepage_mapper.py

      - name: Run static Pages build contract tests
        run: python -m pytest -q tests/test_build_cloudflare_pages.py

      - name: Run MVP shell runtime harness
        run: node tests/browser/verify_mvp_shell_runtime.mjs

      - name: Install Node test dependencies
        run: npm ci --ignore-scripts

      - name: Run responsive browser contract
        run: node tests/browser/verify_first_use_responsive.mjs

      - name: Run housing department browser contract
        shell: bash
        run: |
          set -euo pipefail

          python scripts/build_cloudflare_pages.py --mode live

          python -m http.server 8768 \
            --bind 127.0.0.1 \
            --directory dist/cloudflare-pages \
            > /tmp/housing-e2e-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8768/"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              raise SystemExit("housing E2E server did not become ready")
          PY

          node tests/browser/verify_housing_quest_e2e.mjs \
            http://127.0.0.1:8768

      - name: Run Cloudflare MVP Function contract test
        env:
          RUN_CLOUDFLARE_FUNCTION_CONTRACTS: "1"
        run: node tests/functions/test_cloudflare_mvp_ask_contract.mjs

      - name: Run Page Agent lab focused Python contracts
        run: python -m pytest -q tests/test_page_agent_lab.py -k "not build_output and not route and not root_route and not mvp_route and not mobile_route and not admin_route and not mvp_api and not build_script"

      - name: Run Page Agent lab runtime verification
        run: node tests/browser/verify_page_agent_lab_runtime.mjs

      - name: Run Page Agent lab browser E2E
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          python -m http.server 8767 \
            --bind 127.0.0.1 \
            --directory src/web \
            > /tmp/page-agent-e2e-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8767/examples/page-agent/"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      if response.status == 200 and "Page Agent" in body:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              import sys
              try:
                  with open("/tmp/page-agent-e2e-server.log", "r") as f:
                      sys.stderr.write("--- Server log ---\n")
                      sys.stderr.write(f.read())
                      sys.stderr.write("--- End server log ---\n")
                  dir_listing = urllib.request.urlopen("http://127.0.0.1:8767/examples/")
                  sys.stderr.write("examples dir: " + dir_listing.read().decode("utf-8", errors="replace")[:500] + "\n")
              except Exception as e:
                  sys.stderr.write("Could not read server log or dir listing: " + str(e) + "\n")
              raise SystemExit("Page Agent E2E server did not become ready")
          PY

          node tests/browser/verify_page_agent_lab_e2e.mjs \
            http://127.0.0.1:8767

      - name: Check whitespace errors
        run: git diff --check
