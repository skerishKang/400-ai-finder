name: MVP Contract Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mvp-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Run MVP contract pytest suite
        run: |
          python -m pytest -q \
            tests/test_mvp_failure_codes.py \
            tests/test_mobile_demo.py \
            tests/test_citizen_first_use_shell.py \
            tests/test_citizen_action_demo_chat_shell_contract.py \
            tests/test_citizen_action_demo_canvas.py

      - name: Run canonical official snapshot contracts
        run: |
          python -m pytest -q \
            tests/test_bukgu_official_apartment_snapshot.py \
            tests/test_bukgu_official_content_snapshots.py \
            tests/test_renderer_route_manifest_fidelity.py \
            tests/test_capture_required_entry_spec.py \
            tests/test_exact_official_site_clone_invariant.py \
            tests/test_bukgu_quest_schema.py \
            tests/test_bukgu_quest_to_action_plan.py \
            tests/test_mvp_golden_quest_fidelity_matrix.py

      - name: Run legacy requests transport contract tests
        run: python -m pytest -q tests/test_legacy_requests_transport.py

      - name: Run legacy crawler fallback contract suites
        run: |
          python -m pytest -q \
            tests/test_url_crawler.py \
            tests/test_homepage_mapper.py

      - name: Run static Pages build contract tests
        run: python -m pytest -q tests/test_build_cloudflare_pages.py

      - name: Run MVP shell runtime harness
        run: node tests/browser/verify_mvp_shell_runtime.mjs

      - name: Install Node test dependencies
        run: npm ci --ignore-scripts

      - name: Run responsive browser contract
        run: node tests/browser/verify_first_use_responsive.mjs

      - name: Run mobile link safety browser contract (live build, port 8769)
        shell: bash
        run: |
          set -euo pipefail

          PYTHONPATH=. python scripts/build_cloudflare_pages.py --mode live

          python -m http.server 8769 \
            --bind 127.0.0.1 \
            --directory dist/cloudflare-pages \
            > /tmp/mobile-link-safety-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8769/mobile.html"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              raise SystemExit("mobile link safety server did not become ready")
          PY

          node tests/browser/verify_mobile_link_safety.mjs \
            http://127.0.0.1:8769/mobile.html

      - name: Run housing department browser contract
        shell: bash
        run: |
          set -euo pipefail

          python scripts/build_cloudflare_pages.py --mode live

          python -m http.server 8768 \
            --bind 127.0.0.1 \
            --directory dist/cloudflare-pages \
            > /tmp/housing-e2e-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8768/"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      if response.status == 200:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              raise SystemExit("housing E2E server did not become ready")
          PY

          node tests/browser/verify_housing_quest_e2e.mjs \
            http://127.0.0.1:8768

          node tests/browser/verify_mayor_writing_e2e.mjs \
            http://127.0.0.1:8768

      - name: Run Cloudflare MVP Function contract test
        env:
          RUN_CLOUDFLARE_FUNCTION_CONTRACTS: "1"
        run: node tests/functions/test_cloudflare_mvp_ask_contract.mjs

      - name: Run Page Agent lab Python contracts (full suite)
        run: python -m pytest -q tests/test_page_agent_lab.py

      - name: Run Page Agent lab runtime verification
        run: node tests/browser/verify_page_agent_lab_runtime.mjs

      - name: Run Page Agent lab browser E2E
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          PYTHONPATH=. python scripts/build_cloudflare_pages.py --mode live

          test -f dist/cloudflare-pages/examples/page-agent/index.html
          test -f dist/cloudflare-pages/examples/page-agent/mock-model.js
          test -f dist/cloudflare-pages/examples/page-agent/page-agent-lab.js
          test -f dist/cloudflare-pages/examples/page-agent/vendor/page-agent.iife.js
          test -f dist/cloudflare-pages/examples/page-agent/vendor/LICENSE

          python -m http.server 8767 \
            --bind 127.0.0.1 \
            --directory dist/cloudflare-pages \
            > /tmp/page-agent-e2e-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8767/examples/page-agent/"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      if response.status == 200 and "Local interoperability experiment" in body:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              import sys
              try:
                  with open("/tmp/page-agent-e2e-server.log", "r") as f:
                      sys.stderr.write("--- Server log ---\n")
                      sys.stderr.write(f.read())
                      sys.stderr.write("--- End server log ---\n")
              except Exception as e:
                  sys.stderr.write("Could not read server log: " + str(e) + "\n")
              raise SystemExit("Page Agent E2E server did not become ready")
          PY

          node tests/browser/verify_page_agent_lab_e2e.mjs \
            http://127.0.0.1:8767

      - name: Run Page Agent comparison contract tests (full suite)
        run: python -m pytest -q tests/test_page_agent_comparison_contract.py

      - name: Run Page Agent comparison evidence contract tests
        if: always()
        run: |
          python -m pytest -q tests/test_page_agent_comparison_evidence.py

      - name: Verify expectations fixture integrity
        run: |
          python - <<'PY'
          import json

          with open(
              "tests/fixtures/page_agent_comparison_expectations.json",
              encoding="utf-8",
          ) as f:
              data = json.load(f)

          assert data["schema_version"] == "1.0.0"
          assert len(data["scenarios"]) == 5

          for scenario in data["scenarios"]:
              assert "deterministic" in scenario
              assert "page_agent" in scenario
              assert "trigger" in scenario["deterministic"]
              assert "trigger" in scenario["page_agent"]

          print("Expectations fixture: OK")
          PY

      - name: Run resident demo browser E2E
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          PYTHONPATH=. python scripts/build_cloudflare_pages.py --mode live

          test -f dist/cloudflare-pages/examples/page-agent/resident/index.html
          test -f dist/cloudflare-pages/examples/page-agent/resident/resident-mock-model.js
          test -f dist/cloudflare-pages/examples/page-agent/resident/resident-demo.js
          test -f dist/cloudflare-pages/examples/page-agent/resident/resident-demo.css
          test -f dist/cloudflare-pages/examples/page-agent/vendor/page-agent.iife.js
          test -f dist/cloudflare-pages/examples/page-agent/vendor/LICENSE

          python -m http.server 8766 \
            --bind 127.0.0.1 \
            --directory dist/cloudflare-pages \
            > /tmp/resident-e2e-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8766/examples/page-agent/resident/"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      if response.status == 200 and "Page Agent형 AI 북구청" in body:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              import sys
              try:
                  with open("/tmp/resident-e2e-server.log", "r") as f:
                      sys.stderr.write("--- Server log ---\n")
                      sys.stderr.write(f.read())
                      sys.stderr.write("--- End server log ---\n")
              except Exception as e:
                  sys.stderr.write("Could not read server log: " + str(e) + "\n")
              raise SystemExit("Resident E2E server did not become ready")
          PY

          node tests/browser/verify_resident_e2e.mjs \
            http://127.0.0.1:8766

      - name: Run Stage 3 browser comparison harness (static build, port 8765, 1 rep)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          PYTHONPATH=. python scripts/build_cloudflare_pages.py --mode static

          test -f dist/cloudflare-pages/examples/page-agent/resident/index.html
          test -f dist/cloudflare-pages/examples/page-agent/vendor/page-agent.iife.js
          test -f dist/cloudflare-pages/mvp/index.html

          python -m http.server 8765 \
            --bind 127.0.0.1 \
            --directory dist/cloudflare-pages \
            > /tmp/comparison-harness-server.log 2>&1 &

          server_pid=$!

          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }

          trap cleanup EXIT

          python - <<'PY'
          import time
          import urllib.request

          url = "http://127.0.0.1:8765/examples/page-agent/resident/"

          for _ in range(40):
              try:
                  with urllib.request.urlopen(url, timeout=1) as response:
                      body = response.read().decode("utf-8", errors="replace")
                      if response.status == 200 and "Page Agent형 AI 북구청" in body:
                          break
              except Exception:
                  time.sleep(0.25)
          else:
              import sys
              try:
                  with open("/tmp/comparison-harness-server.log", "r") as f:
                      sys.stderr.write("--- Server log ---\n")
                      sys.stderr.write(f.read())
                      sys.stderr.write("--- End server log ---\n")
              except Exception as e:
                  sys.stderr.write("Could not read server log: " + str(e) + "\n")
              raise SystemExit("Comparison harness server did not become ready")
          PY

          node scripts/run_page_agent_comparison.mjs \
            --base-url http://127.0.0.1:8765 \
            --repetitions 1 \
            --output /tmp/comparison-evidence-ci.json

      - name: Verify Stage 3 evidence schema on CI-generated evidence (10 runs)
        if: always()
        run: |
          python - <<'PY'
          import json

          with open("/tmp/comparison-evidence-ci.json", encoding="utf-8") as f:
              data = json.load(f)

          assert data["schema_version"] == "1.0.0"

          runs = data["primary_runs"]
          assert len(runs) == 10, (
              "Expected 10 runs "
              f"(5 scenarios x 2 modes x 1 rep), got {len(runs)}"
          )

          for run in runs:
              label = (
                  f'{run["mode"]}/'
                  f'{run["scenario_id"]}/'
                  f'{run["attempt"]}'
              )

              assert run["external_request_count"] == 0, (
                  f"External request in {label}: "
                  f'{run["external_request_count"]}'
              )
              assert run["no_submit_preserved"] is True

              criteria = run.get("pass_criteria_results", [])
              assert criteria, (
                  f"Run {label} has empty pass_criteria_results"
              )

              for criterion in criteria:
                  assert "criterion" in criterion
                  assert "passed" in criterion

              sequence = run.get("action_sequence", [])
              if sequence:
                  if run["mode"] == "deterministic":
                      expected_count = len(
                          [
                              action
                              for action in sequence
                              if action not in ("message", "", "noop")
                          ]
                      )
                  else:
                      expected_count = len(
                          [
                              action
                              for action in sequence
                              if action not in ("done", "stop")
                          ]
                      )

                  assert run.get("action_step_count", 0) == expected_count, (
                      f'action_step_count '
                      f'{run.get("action_step_count")} '
                      f"!= expected count {expected_count} "
                      f'for mode {run["mode"]}'
                  )

          print(
              "Evidence schema OK: "
              f"{len(runs)} runs, 0 external requests, "
              "all no_submit preserved, "
              "all pass_criteria populated"
          )
          PY

      - name: Check whitespace errors
        run: git diff --check
