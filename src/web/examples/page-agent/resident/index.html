<!DOCTYPE html>
<html lang="ko" data-page-agent-plan-mode="local">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Agent형 AI 북구청 — 비교 데모</title>
<link rel="stylesheet" href="../../../static/citizen-action-demo-canvas.css">
<link rel="stylesheet" href="../../../static/citizen-copilot-shell.css">
<link rel="stylesheet" href="resident-demo.css">
<!--
  Plan mode is explicit only:
    data-page-agent-plan-mode="local"  (default offline mock)
    data-page-agent-plan-mode="server" (same-origin /api/page-agent/plan)
  Or inject window.__PAGE_AGENT_PLAN_CONFIG__ = { mode: "server" } from a
  controlled build/config script. Query-string alone never enables server mode.
-->
</head>
<body>
<div class="resident-layout">
  <div class="resident-canvas" role="main" aria-label="북구청 안내 화면">
    <div id="demo-canvas"></div>
  </div>

  <aside class="resident-chat" role="complementary" aria-label="Page Agent 챗봇">
    <div class="chat-header">
      <div class="chat-header__title">
        <span>🤖</span> Page Agent형 AI 북구청
      </div>
      <div class="chat-header__sub">주민용 비교 데모 · 실시간 DOM 동작</div>
      <div class="chat-header__badges">
        <span class="badge badge--offline" id="plan-mode-badge">🔒 오프라인/mock</span>
        <span class="badge badge--sameorigin">🏠 동일 출처</span>
        <span class="badge badge--nosubmit">🚫 제출 불가</span>
      </div>
      <div class="chat-header__status" id="chat-status">초기화 중...</div>
    </div>

    <div class="chat-messages" id="chat-messages" aria-live="polite">
      <div class="chat-msg chat-msg--agent">
        <div class="chat-bubble chat-bubble--agent">
          안녕하세요. Page Agent형 AI 북구청입니다. 원하시는 행정 업무를 말씀해 주시면,
          AI가 북구청 안내 화면을 직접 탐색하고 관련 내용을 보여드립니다.
        </div>
      </div>
    </div>

    <div class="chat-suggestions" id="chat-suggestions"></div>

    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="무엇을 도와드릴까요?" aria-label="메시지 입력">
      <button class="chat-send" id="chat-send" type="button">보내기</button>
      <button class="chat-cancel" id="chat-cancel" type="button" style="display:none">취소</button>
    </div>
  </aside>
</div>

<script src="../../../static/bukgu-official-snapshots.js"></script>
<script src="../../../static/citizen-action-demo-map.js"></script>
<script src="../../../static/citizen-action-demo-canvas.js"></script>
<script src="../vendor/page-agent.iife.js"></script>
<script src="parity-scenarios.js"></script>
<script src="resident-mock-model.js"></script>
<script src="resident-server-plan-client.js"></script>
<script src="resident-demo.js"></script>
</body>
</html>
